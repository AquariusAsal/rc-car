<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RC FPV Command</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ui-overlay"></div>

    <header>
        <div class="top-bar">
            <div id="connection-status" class="status-indicator">SYSTEM: OFFLINE</div>
            <div class="header-buttons">
                <button id="btn-connect" onclick="connectBluetooth()">🔗 CONNECT BT</button>
                <button id="btn-motor" onclick="toggleMotorPanel()">⚡ MOTOR</button>
                <button id="btn-settings" onclick="toggleSettings()">⚙️ SETUP</button>
            </div>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="motor-ind-wrap">
            <div class="motor-bar-v-wrap">
                <div id="bar-a" class="motor-bar-v-fill"></div>
            </div>
            <span class="motor-ind-label">A</span>
            <span id="pct-a" class="motor-ind-pct">0%</span>
        </div>

        <div class="gauge">
            <div class="gauge-body">
                <div class="gauge-cover">
                    <span id="speed-display">0</span>
                    <span class="unit">%</span>
                </div>
            </div>
        </div>

        <div class="motor-ind-wrap">
            <div class="motor-bar-v-wrap">
                <div id="bar-b" class="motor-bar-v-fill"></div>
            </div>
            <span class="motor-ind-label">B</span>
            <span id="pct-b" class="motor-ind-pct">0%</span>
        </div>
    </div>

    <div id="layout-ps4" class="control-layout">
        <div class="controller-status-box transparent-box">
            <h2>🎮 Gamepad Modus</h2>
            <p id="gamepad-status" class="pulsing">Warte auf Controller...</p>
            <div class="info-text">Verbinde deinen PS4/Xbox Controller per Bluetooth mit dem Handy.</div>
        </div>
    </div>

    <div id="layout-wheel" class="control-layout hidden">
        <div class="wheel-fpv-layout">
            <div class="racing-cockpit">
                <div class="wheel-container">
                    <div id="steering-wheel"></div>
                </div>
                <div class="pedals-container">
                    <div class="pedal brake" id="pedal-brake"><span>BREMSE</span></div>
                    <div class="pedal gas" id="pedal-gas"><span>GAS</span></div>
                </div>
            </div>
            <div class="fpv-box">
                <img id="camera-stream" src="" alt="WARTE AUF VIDEO...">
            </div>
        </div>
    </div>

    <div id="layout-auto" class="control-layout hidden">
        <div class="macro-grid">
            <h3>Autopilot Programme</h3>
            <button class="btn-macro" onclick="send('K')">⭕ Kreisfahrt</button>
            <button class="btn-macro" onclick="send('Q')">⬜ Rechteck</button>
            <button class="btn-macro stop-macro" onclick="send('S')">⚠️ NOT-HALT</button>
        </div>
    </div>

    <!-- Motor Konfiguration Panel (Bottom Sheet) -->
    <div id="motor-panel" class="motor-panel hidden">
        <div class="motor-panel-header" onclick="toggleMotorPanel()">
            <span>⚡ MOTOR KONFIGURATION</span>
            <span class="panel-close">✕</span>
        </div>
        <div class="motor-panel-body">

            <div class="slider-section">
                <div class="slider-label-row">
                    <label>🚀 Max. Geschwindigkeit</label>
                    <span id="speed-pct-label" class="slider-val">78%</span>
                </div>
                <input type="range" class="motor-slider" id="slider-speed"
                       min="0" max="255" value="200" oninput="updateMaxSpeed(this.value)">
                <div class="slider-ticks">
                    <span>0</span><span>Langsam</span><span>Mittel</span><span>Schnell</span><span>Max</span>
                </div>
            </div>

            <div class="slider-section">
                <div class="slider-label-row">
                    <label>↪️ Kurvendifferenzial</label>
                    <span id="curve-pct-label" class="slider-val">39%</span>
                </div>
                <input type="range" class="motor-slider" id="slider-curve"
                       min="0" max="255" value="100" oninput="updateCurveSpeed(this.value)">
                <div class="slider-ticks">
                    <span>Eng</span><span></span><span>Mittel</span><span></span><span>Weit</span>
                </div>
            </div>

            <div class="trim-row">
                <div class="trim-group">
                    <label>Motor A Trimm</label>
                    <div class="trim-btns">
                        <button onclick="adjustTrim('a', -5)">−</button>
                        <span id="trim-a-val" class="trim-val">0%</span>
                        <button onclick="adjustTrim('a', 5)">+</button>
                    </div>
                </div>
                <div class="trim-divider"></div>
                <div class="trim-group">
                    <label>Motor B Trimm</label>
                    <div class="trim-btns">
                        <button onclick="adjustTrim('b', -5)">−</button>
                        <span id="trim-b-val" class="trim-val">0%</span>
                        <button onclick="adjustTrim('b', 5)">+</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <h3>System Konfiguration</h3>
            <div class="setting-block">
                <label>📡 FPV Kamera IP:</label>
                <input type="text" id="camera-ip" placeholder="192.168.4.1" value="">
                <button onclick="startStream()" class="btn-action">Kamera Starten</button>
            </div>
            <div class="setting-block">
                <label>🕹️ Steuerungs-Modus:</label>
                <select id="mode-selector" onchange="changeLayout()">
                    <option value="ps4">Playstation/Xbox Controller</option>
                    <option value="wheel">Touchscreen Lenkrad</option>
                    <option value="auto">Automatik Routen</option>
                </select>
            </div>
            <button class="btn-close" onclick="toggleSettings()">Schließen</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
